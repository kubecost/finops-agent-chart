{{- /*
This file is only rendered when all three externalLabels.configMap fields are set:
  name, namespace, and path.

When externalLabels is configured, the deployment needs to read a ConfigMap that
may live in a different namespace from where the agent is deployed. A ClusterRole and
ClusterRoleBinding are used so that the agent's ServiceAccount can access the ConfigMap
regardless of which namespace it resides in, without requiring resources to be created
in the target namespace.

ClusterRole
  - Cluster-scoped; no namespace in metadata.
  - Grants "get", "list", and "watch" on ConfigMaps across the cluster.

ClusterRoleBinding
  - Cluster-scoped; no namespace in metadata.
  - Binds the ClusterRole to the agent's ServiceAccount, which lives in the agent's
    own release namespace (.Release.Namespace).
*/}}

{{- if and
      ((.Values.externalLabels).configMap).name
      ((.Values.externalLabels).configMap).namespace
      ((.Values.externalLabels).configMap).path
}}
{{- /* ClusterRole: grants read access to ConfigMaps cluster-wide. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-configmap-reader" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" .) | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
{{- /* ClusterRoleBinding: attaches the ClusterRole to the agent's ServiceAccount. */}}
{{- /*
  subjects.namespace is the agent's release namespace (where the ServiceAccount lives).
  ClusterRoleBinding is cluster-scoped so no metadata.namespace is needed.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-configmap-reader" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" $) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" .) | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "finops-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-configmap-reader" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- end }}
